services:
  client:
    profiles:
      - prod

  server:
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/ai_support
      CLIENT_URL: http://localhost:5173
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  client-dev:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - server
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network
